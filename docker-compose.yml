services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: gestionbancaria
      MYSQL_ROOT_PASSWORD: mysqldbALEJO
      MYSQL_ROOT_HOST: '%'
    ports:
      - "3306:3306"
    networks:
      - microservices-network
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
  
  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"    # Puerto para AMQP
      - "15672:15672"  # Puerto para la interfaz de administración
    networks:
      - microservices-network
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  cliente_persona_service:
    image: cliente_persona_service
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gestionbancaria?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysqldbALEJO
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABbitMQ_PASSWORD: guest
    networks:
      - microservices-network
    depends_on:
      - mysql
      - rabbitmq

  cuenta_movimientos_service:
    image: cuenta_movimientos_service
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/gestionbancaria?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mysqldbALEJO
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: guest
      SPRING_RABbitMQ_PASSWORD: guest
    networks:
      - microservices-network
    depends_on:
      - mysql
      - rabbitmq

networks:
  microservices-network:
    driver: bridge

volumes:
  rabbitmq_data: